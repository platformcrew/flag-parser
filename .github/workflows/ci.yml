name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run tests
        run: go test ./... -v -race -count=1

      - name: Build binary
        run: CGO_ENABLED=0 go build -o flag-parser .

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flag-parser:test .

      - name: Smoke test — flag found
        run: |
          output_file=$(mktemp)
          docker run --rm \
            -e INPUT_FLAGS='use-depot-runner: "[use-depot-runner]"' \
            -e INPUT_TEXT='build with [use-depot-runner] enabled' \
            -e GITHUB_OUTPUT=/github/output \
            -v "$output_file:/github/output" \
            flag-parser:test
          echo "=== Output file ==="
          cat "$output_file"
          grep -q "use-depot-runner=true" "$output_file" || (echo "FAIL: expected use-depot-runner=true" && exit 1)

      - name: Smoke test — flag not found
        run: |
          output_file=$(mktemp)
          docker run --rm \
            -e INPUT_FLAGS='skip-tests: "[skip-tests]"' \
            -e INPUT_TEXT='regular commit message' \
            -e GITHUB_OUTPUT=/github/output \
            -v "$output_file:/github/output" \
            flag-parser:test
          echo "=== Output file ==="
          cat "$output_file"
          grep -q "skip-tests=false" "$output_file" || (echo "FAIL: expected skip-tests=false" && exit 1)

      - name: Smoke test — multiple flags
        run: |
          output_file=$(mktemp)
          docker run --rm \
            -e $'INPUT_FLAGS=use-depot-runner: "[use-depot-runner]"\nskip-tests: "[skip-tests]"' \
            -e 'INPUT_TEXT=deploy with [use-depot-runner]' \
            -e GITHUB_OUTPUT=/github/output \
            -v "$output_file:/github/output" \
            flag-parser:test
          echo "=== Output file ==="
          cat "$output_file"
          grep -q "use-depot-runner=true" "$output_file" || (echo "FAIL: expected use-depot-runner=true" && exit 1)
          grep -q "skip-tests=false" "$output_file" || (echo "FAIL: expected skip-tests=false" && exit 1)
